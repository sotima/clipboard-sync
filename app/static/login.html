<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    .lang-switch {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.25rem;
    }
    .lang-btn {
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid #0f3460;
      border-radius: 5px;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .lang-btn.active { color: #a0c4ff; border-color: #a0c4ff; }

    h1 {
      font-size: 1.3rem;
      color: #a0c4ff;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.35rem;
    }

    input[type="password"] {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      padding: 0.65rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #a0c4ff; }

    button[type="submit"] {
      width: 100%;
      margin-top: 1rem;
      padding: 0.65rem;
      background: #a0c4ff;
      color: #0d1b2a;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.88; }

    .error {
      display: none;
      margin-top: 0.9rem;
      padding: 0.5rem 0.75rem;
      background: #3a1a1a;
      border: 1px solid #f44336;
      border-radius: 6px;
      color: #f44336;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>

    <h1>Clipboard Sync</h1>

    <form method="post" action="/login">
      <label id="lbl-password" for="password"></label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" />
      <button type="submit" id="btn-submit"></button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    const T = {
      de: { label: 'Passwort', submit: 'Anmelden',  error: 'Falsches Passwort' },
      en: { label: 'Password', submit: 'Log in',    error: 'Wrong password'    },
    };

    const DEFAULT_LANG = '{{DEFAULT_LANG}}';
    let lang = localStorage.getItem('clipboard-sync-lang') || DEFAULT_LANG;

    function setLang(l) {
      lang = l;
      localStorage.setItem('clipboard-sync-lang', l);
      document.documentElement.lang = l;
      const t = T[l] || T['de'];
      document.getElementById('lbl-password').textContent = t.label;
      document.getElementById('btn-submit').textContent   = t.submit;
      document.getElementById('error').textContent        = t.error;
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l));
    }

    setLang(lang);

    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
