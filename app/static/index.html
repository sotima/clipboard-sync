<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #a0c4ff;
    }

    #status {
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #4caf50; }
    #status-dot.disconnected { background: #f44336; }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 720px;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.75rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #a0c4ff; }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 140px;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-paste  { background: #0f3460; color: #a0c4ff; }
    #btn-copy   { background: #a0c4ff; color: #0d1b2a; }
    #btn-clear  { background: #2a1a2e; color: #cc88ff; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #4caf50;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #last-update {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.5rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.25rem;">
    <h1 style="margin:0;">Clipboard Sync</h1>
    <form method="post" action="/logout" style="margin:0;">
      <button type="submit" style="flex:none;min-width:auto;padding:0.3rem 0.75rem;font-size:0.8rem;background:#2a1a2e;color:#cc88ff;">Abmelden</button>
    </form>
  </div>
  <div id="status">
    <span id="status-dot" class="disconnected"></span>
    <span id="status-text">Verbinde...</span>
  </div>

  <div class="card">
    <textarea id="content" placeholder="Hier Text eingeben oder einfuegen..."></textarea>
    <div id="last-update"></div>
    <div class="actions">
      <button id="btn-paste" title="Aus lokaler Zwischenablage einfuegen">Aus Zwischenablage einfuegen</button>
      <button id="btn-copy"  title="In lokale Zwischenablage kopieren">In Zwischenablage kopieren</button>
      <button id="btn-clear" title="Inhalt loeschen">Leeren</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const textarea   = document.getElementById('content');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const lastUpdate = document.getElementById('last-update');
    const toast      = document.getElementById('toast');
    let ws, sendTimer;

    function showToast(msg, color = '#4caf50') {
      toast.textContent = msg;
      toast.style.background = color;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function setStatus(connected) {
      statusDot.className = connected ? 'connected' : 'disconnected';
      statusText.textContent = connected ? 'Verbunden' : 'Getrennt – reconnecting...';
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen  = () => setStatus(true);
      ws.onclose = (e) => {
        setStatus(false);
        if (e.code === 4001) { location.href = '/login'; return; }
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        textarea.value = e.data;
        const now = new Date().toLocaleTimeString();
        lastUpdate.textContent = `Zuletzt empfangen: ${now}`;
        showToast('Inhalt aktualisiert');
      };
    }

    // Debounced send on textarea input
    textarea.addEventListener('input', () => {
      clearTimeout(sendTimer);
      sendTimer = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(textarea.value);
        }
      }, 400);
    });

    document.getElementById('btn-paste').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        textarea.value = text;
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(text);
        showToast('Eingefuegt und synchronisiert');
      } catch {
        showToast('Zugriff auf Zwischenablage verweigert', '#f44336');
      }
    });

    document.getElementById('btn-copy').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(textarea.value);
        showToast('In Zwischenablage kopiert');
      } catch {
        showToast('Kopieren fehlgeschlagen', '#f44336');
      }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      textarea.value = '';
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('');
      lastUpdate.textContent = '';
    });

    connect();
  </script>
</body>
</html>
